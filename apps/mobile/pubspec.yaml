name: campus_connect_mobile
description: "Campus Connect Mobile - Flutter Client Application"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.2
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1
  firebase_analytics: ^11.2.0
  firebase_crashlytics: ^4.0.1
  flutter_dotenv: ^5.1.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
